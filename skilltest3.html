<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            margin: 80px auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-warning {
            width: 100%;
        }
        #show_here {
            display: block;
            margin-top: 15px;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>

        <label class="form-label">Username</label>
        <input type="text" class="form-control" id="username">

        <label class="form-label mt-3">Password</label>
        <input type="password" class="form-control" id="password">

        <button type="button" class="btn btn-warning mt-4" onclick="login()">Log In</button>

        <kbd id="show_here">Enter your login details</kbd>
    </div>

    <script>
        function login() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;

            if (user === "" || pass === "") {
                alert("Please enter both username and password.");
                return;
            }

            // Change these to your desired username and password
            var correctUsername = "admin";
            var correctPassword = "1234";

            if (user === correctUsername && pass === correctPassword) {
                document.getElementById("show_here").innerHTML = "Login Successful!";
                document.getElementById("show_here").style.backgroundColor = "#d4edda";
            } else {
                document.getElementById("show_here").innerHTML = "Invalid Username or Password.";
                document.getElementById("show_here").style.backgroundColor = "#f8d7da";
            }
        }
    </script>
</body>
</html>
